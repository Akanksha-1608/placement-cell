<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Roboto, sans-serif;
}

body{
  background:#dad4df;
  min-height:100vh;
}

/* ================= NAVBAR ================= */
.navbar{
  background:#372244;
  color:#f8f0ea;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

.logo{
  font-size:24px;
  font-weight:bold;
}

.nav-links a{
  color:#f8f0ea;
  margin-left:25px;
  text-decoration:none;
  font-weight:500;
  transition:0.3s;
}

.nav-links a:hover{
  color:white;
  font-weight:bold;
}

/* ================= WRAPPER ================= */
.wrapper{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:60px 20px;
}

/* ================= MAIN CONTAINER ================= */
.login-container{
  width:1000px;            /* perfect balanced size */
  height:500px;            /* balanced height */
  background:white;
  display:flex;
  border-radius:25px;
  box-shadow:0 15px 35px rgba(55,34,68,0.15);
  overflow:hidden;
}

/* ================= LEFT SIDE ================= */
.left-side{
  width:50%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px;
}

.left-side img{
  max-width:80%;
  height:auto;
}

/* ================= RIGHT SIDE ================= */
.right-side{
  width:50%;
  padding:70px 60px;
  background:linear-gradient(135deg,#561d46,#ae6a97,#eca8bb);
  color:white;
}

.right-side h2{
  font-size:30px;
  margin-bottom:30px;
}

/* ================= FORM ================= */
.form-group{
  margin-bottom:20px;
}

.form-group label{
  display:block;
  margin-bottom:6px;
  font-weight:600;
}

.form-group input{
  width:100%;
  padding:13px;
  border:none;
  border-radius:12px;
  font-size:15px;
  outline:none;
}

.form-group input:focus{
  box-shadow:0 0 0 3px rgba(255,255,255,0.4);
}

/* ================= BUTTON ================= */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:30px;
  font-size:16px;
  font-weight:600;
  color:#561d46;
  background:white;
  cursor:pointer;
  transition:0.3s;
  margin-top:10px;
}

.btn:hover{
  transform:scale(1.05);
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.extra{
  margin-top:15px;
  font-size:14px;
}

.extra a{
  color:white;
  font-weight:bold;
  text-decoration:none;
}

/* ================= RESPONSIVE ================= */
@media(max-width:900px){
  .login-container{
    flex-direction:column;
    width:95%;
    height:auto;
  }

  .left-side,
  .right-side{
    width:100%;
  }

  .right-side{
    padding:40px;
  }
}
</style>
</head>

<body>

<nav class="navbar">
  <div class="logo">PLACEMENT CELL</div>
  <div class="nav-links">
    <a href="homepage.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<div class="wrapper">
  <div class="login-container">

    <!-- LEFT SIDE -->
    <div class="left-side">
      <img src="learning.png" alt="Students">
    </div>

    <!-- RIGHT SIDE -->
    <div class="right-side">
      <h2>Student Login</h2>

      <form id="loginForm" method="POST">
        <div class="form-group">
          <label>Registration Number</label>
         <input type="text" name="registration_no" placeholder="Enter registration number">
        </div>

        <div class="form-group">
          <label>Password</label>
         <input type="password" name="password" placeholder="Enter password">
        </div>

        <button class="btn">Login</button>
         <div class="extra">
        Don’t have an account? <a href="studentregister.html">Register</a>
      </div>
        <p id="message" style="margin-top:10px; font-weight:600;"></p>
      </form>

     

    </div>

  </div>
</div>
<script>
document.addEventListener("DOMContentLoaded", function () {

    const form = document.getElementById("loginForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", function (e) {
        e.preventDefault();

        const formData = new FormData(form);

        fetch("studentlogin.php", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {

            if (data.status === "success") {
                message.style.color = "white";
                message.innerText = data.message;

                setTimeout(() => {
                    window.location.href = "studentdashboards.php";
                }, 1500);

            } else {
                message.style.color = "yellow";
                message.innerText = data.message;
            }

        })
        .catch(() => {
            message.innerText = "Server error!";
        });
    });

});
</script>

</body>
</html>
