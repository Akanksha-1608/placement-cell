<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Roboto,sans-serif;
}

body{
background:#dad4df;
min-height:100vh;
}

/* NAVBAR */

.navbar{
background:#372244;
color:#f8f0ea;
display:flex;
justify-content:space-between;
align-items:center;
padding:22px 70px;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

.logo{
font-size:26px;
font-weight:bold;
}

.nav-links a{
color:#f8f0ea;
margin-left:28px;
text-decoration:none;
font-weight:500;
}

.nav-links a:hover{
color:white;
font-weight:bold;
}

/* WRAPPER */

.wrapper{
display:flex;
justify-content:center;
align-items:center;
padding:60px 20px;
}

/* CONTAINER */

.login-container{
width:1000px;
height:500px;
background:white;
display:flex;
border-radius:25px;
box-shadow:0 15px 35px rgba(55,34,68,0.15);
overflow:hidden;
}

/* LEFT */

.left-side{
width:50%;
padding:70px 60px;
background:linear-gradient(135deg,#561d46,#ae6a97,#eca8bb);
color:white;
}

.left-side h2{
font-size:30px;
margin-bottom:30px;
}

/* RIGHT */

.right-side{
width:50%;
display:flex;
justify-content:center;
align-items:center;
}

.right-side img{
max-width:85%;
}

/* FORM */

.form-group{
margin-bottom:20px;
}

.form-group label{
display:block;
margin-bottom:6px;
font-weight:600;
}

.form-group input{
width:100%;
padding:13px;
border:none;
border-radius:12px;
font-size:15px;
outline:none;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:30px;
font-size:16px;
font-weight:600;
color:#561d46;
background:white;
cursor:pointer;
margin-top:10px;
}

.btn:hover{
transform:scale(1.05);
}

#message{
margin-top:12px;
font-weight:600;
}

</style>
</head>

<body>

<nav class="navbar">
<div class="logo">PLACEMENT CELL</div>

<div class="nav-links">
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Contact</a>
</div>
</nav>

<div class="wrapper">

<div class="login-container">

<div class="left-side">

<h2>Admin Login</h2>

<form id="adminLoginForm">

<div class="form-group">
<label>Admin ID</label>
<input type="text" name="admin_id" placeholder="Enter Admin ID">
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password" placeholder="Enter Password">
</div>

<button type="submit" class="btn">Login</button>

<p id="message"></p>

</form>

</div>

<div class="right-side">
<img src="admin 4.jfif">
</div>

</div>

</div>

<script src="adminlogin.js"></script>

</body>
</html>
