<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Register | Placement Cell</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Roboto, sans-serif;
}

body{
background:#dad4df;
min-height:100vh;
}

/* NAVBAR */

.navbar{
background:#372244;
color:#f8f0ea;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
}

.logo{
font-size:24px;
font-weight:bold;
}

.nav-links a{
color:#f8f0ea;
margin-left:25px;
text-decoration:none;
}

/* WRAPPER */

.wrapper{
display:flex;
justify-content:center;
align-items:center;
padding:60px 20px;
}

/* CONTAINER */

.register-container{
width:1000px;
background:white;
display:flex;
border-radius:25px;
box-shadow:0 15px 40px rgba(55,34,68,0.15);
overflow:hidden;
}

/* LEFT SIDE IMAGE */

.left-side{
width:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
}

.left-side img{
width:80%;
height:auto;
}

/* RIGHT SIDE FORM */

.right-side{
width:50%;
padding:60px;
background:linear-gradient(135deg,#561d46,#ae6a97,#eca8bb);
color:white;
}

.right-side h2{
margin-bottom:25px;
}

/* FORM */

.form-group{
margin-bottom:18px;
}

.form-group label{
display:block;
margin-bottom:6px;
font-weight:600;
}

.form-group input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
font-size:14px;
}

.error{
color:yellow;
font-size:13px;
margin-top:5px;
}

.success{
border:2px solid #28a745 !important;
}

.error-input{
border:2px solid red !important;
}

/* BUTTON */

.btn{
width:100%;
padding:14px;
border:none;
border-radius:30px;
font-size:16px;
font-weight:600;
color:white;
background:#372244;
cursor:pointer;
margin-top:10px;
}

.btn:hover{
background:black;
}

.login-link{
margin-top:15px;
}

.login-link a{
color:white;
font-weight:bold;
}

#message{
margin-top:15px;
font-weight:600;
}

</style>
</head>

<body>

<nav class="navbar">
<div class="logo">PLACEMENT CELL</div>

<div class="nav-links">
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Contact</a>
<a href="#">Login</a>
</div>
</nav>


<div class="wrapper">

<div class="register-container">

<!-- LEFT IMAGE -->
<div class="left-side">
<img src="admin img 1.png">
</div>

<!-- RIGHT FORM -->
<div class="right-side">

<h2>Create Admin Account</h2>

<form id="registrationForm" method="POST" novalidate>

<div class="form-group">
<label>Full Name</label>
<input type="text" name="full_name" placeholder="First Middle Last Name">
<div class="error"></div>
</div>

<div class="form-group">
<label>Admin ID</label>
<input type="text" name="admin_reg_no" placeholder="Example: TS001">
<div class="error"></div>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email" placeholder="Enter email">
<div class="error"></div>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password" placeholder="Enter password">
<div class="error"></div>
</div>

<div class="form-group">
<label>Confirm Password</label>
<input type="password" name="confirm_password" placeholder="Confirm password">
<div class="error"></div>
</div>

<button type="submit" class="btn">Register</button>

<div class="login-link">
Already have an account?
<a href="adminlogin.html">Login</a>
</div>

<p id="message"></p>

</form>

</div>

</div>
</div>

<script src="adminregister.js"></script>

</body>
</html>
